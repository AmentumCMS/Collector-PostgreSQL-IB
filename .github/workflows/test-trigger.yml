name: Test Trigger
run-name: Testing Update Workflow Trigger by @${{ github.actor }}

on:
  push:
    branches: 
      - update-yaml-workflow # Triggers automatically when you push to this branch
  workflow_dispatch: # Also adds a manual button just in case

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        # This creates the .git folder so 'gh' knows which repo to target

      - name: Trigger Update Workflow
        env:
          # Note: The default GITHUB_TOKEN might not have permission to 
          # trigger other workflows. If this fails with "403", 
          # you may need to use a Personal Access Token (PAT).
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Attempting to trigger 'Update Container Versions' on branch 'update-yaml-workflow'..."
          # gh workflow run "Update Container Versions" --ref update-yaml-workflow
          gh workflow run update-versions.yml --ref update-yaml-workflow
