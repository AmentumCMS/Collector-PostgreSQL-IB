name: Test Trigger
on:
  push:
    branches: [ update-yaml-workflow ] # Triggers automatically when you push
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Update Workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run "Update Container Versions" --ref update-yaml-workflow
