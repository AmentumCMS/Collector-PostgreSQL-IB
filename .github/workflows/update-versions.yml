name: Update Container Versions
on:
  push:
    branches:
      - update-yaml-workflow
  workflow_dispatch:

jobs:
  update-yaml:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo jq
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Update YAML tags
        env:
          YAML_FILE: "${{ vars.COLLECTOR }}.yml"
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REGISTRY: ${{ vars.REGISTRY }}
        run: |
          # 1. Login to Registry (The missing piece!)
          echo "Logging into $REGISTRY..."
          skopeo login "$REGISTRY" -u "$REGISTRY_USER" -p "$REGISTRY_TOKEN"

          # 2. Get image list from YAML
          # Adjusting yq syntax to handle various list formats
          IMAGES=$(yq eval '.[] | keys | .[]' "$YAML_FILE")

          for IMAGE in $IMAGES; do
            echo "Checking tags for $IMAGE..."
            
            # 3. Fetch tags (Now with credentials stored in default auth file)
            # We use --tls-verify=false if your environment requires it
            LATEST_TAG=$(skopeo list-tags docker://$IMAGE | jq -r '.Tags[]' | \
              grep -E '^[0-9.]+$' | sort -V | tail -n 1)

            if [ -n "$LATEST_TAG" ] && [ "$LATEST_TAG" != "null" ]; then
              echo "Found latest version: $LATEST_TAG. Updating $YAML_FILE..."
              # Update the tag in the YAML file
              yq eval "(.[] | select(has(\"$IMAGE\"))).\"$IMAGE\"[0] = \"$LATEST_TAG\"" -i "$YAML_FILE"
            else
              echo "No numeric tags found for $IMAGE, skipping..."
            fi
          done

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ vars.COLLECTOR }}.yml"
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update container versions in ${{ vars.COLLECTOR }}.yml"
            git push
          fi
