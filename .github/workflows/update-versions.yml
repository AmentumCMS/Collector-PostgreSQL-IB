name: Update Container Versions
on:
  push:
    branches:
      - update-yaml-workflow
  workflow_dispatch:

jobs:
  update-yaml:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo jq
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Update YAML tags
        env:
          YAML_FILE: "${{ vars.COLLECTOR }}.yml"
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REGISTRY: ${{ vars.REGISTRY }}
        run: |
          # 1. Login
          skopeo login "$REGISTRY" -u "$REGISTRY_USER" -p "$REGISTRY_TOKEN"

          # 2. Get images using yq filter to ignore non-image keys
          # This filter looks for keys that DON'T contain 'regex'
          IMAGES=$(yq eval '.[] | keys | .[] | select(. == "*regex*" | not)' "$YAML_FILE")

          if [ -z "$IMAGES" ]; then
            echo "No images found in $YAML_FILE"
            exit 0
          fi

          for IMAGE in $IMAGES; do
            # 3. Handle registry prefixing
            FULL_IMAGE_PATH="$IMAGE"
            if [[ "$IMAGE" != "$REGISTRY"* ]]; then
               FULL_IMAGE_PATH="$REGISTRY/$IMAGE"
            fi

            echo "Checking tags for $FULL_IMAGE_PATH..."
            
            # 4. Fetch tags - capture error so one bad image doesn't kill the loop
            RAW_TAGS=$(skopeo list-tags "docker://$FULL_IMAGE_PATH" 2>/dev/null || echo '{"Tags":[]}')
            
            LATEST_TAG=$(echo "$RAW_TAGS" | jq -r '.Tags[]' | \
              grep -E '^[0-9.]+$' | sort -V | tail -n 1)

            if [ -n "$LATEST_TAG" ] && [ "$LATEST_TAG" != "null" ]; then
              echo "✅ Found: $LATEST_TAG. Updating $IMAGE in $YAML_FILE"
              # Use double quotes carefully for yq
              yq eval "(.[] | select(has(\"$IMAGE\"))).\"$IMAGE\"[0] = \"$LATEST_TAG\"" -i "$YAML_FILE"
            else
              echo "⚠️ No numeric tags found for $IMAGE"
            fi
          done

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ vars.COLLECTOR }}.yml"
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update container versions in ${{ vars.COLLECTOR }}.yml"
            git push
          fi
